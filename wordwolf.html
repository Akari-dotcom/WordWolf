<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなで☆ワードウルフ</title>
  <style>
    :root { --primary: #1a73e8; --danger: #d93025; --bg: #f0f2f5; }
    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: var(--bg); color: #333; margin: 0; }
    .menu-btn { position: fixed; top: 15px; right: 15px; font-size: 24px; background: none; border: none; cursor: pointer; z-index: 100; color: #555; }
    .sidebar { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; text-align: left; padding: 20px; overflow-y: auto; }
    .sidebar.open { right: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 999; }
    .overlay.show { display: block; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 420px; margin: 50px auto; }
    .screen { display: none; }
    .active { display: block; }
    button { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    .btn-stop { background: var(--danger); }
    .btn-outline { background: #eee; color: #333; margin-top: 5px; }
    input { padding: 10px; font-size: 16px; width: 90%; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
    .word-box { font-size: 32px; font-weight: bold; color: var(--danger); margin: 30px 0; padding: 20px; border: 4px double var(--danger); }
    #timer-display { font-size: 60px; font-weight: bold; }
  </style>
</head>
<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
  <h3>設定メニュー</h3>
  <hr>
  <h4>単語ペアの追加</h4>
  <input type="text" id="newWordA" placeholder="ワードA">
  <input type="text" id="newWordB" placeholder="ワードB">
  <button onclick="addNewPair()">追加</button>
  <hr>
  <h4>登録済み単語 (<span id="wordCount">0</span>)</h4>
  <div id="wordListArea"></div>
</div>

<div class="card">
  <div id="screen-start" class="screen active">
    <h2>ゲーム設定</h2>
    <input type="number" id="playerCount" value="3">
    <input type="number" id="wolfCount" value="1">
    <input type="number" id="limitTime" value="3">
    <button onclick="startGame()">ゲーム開始</button>
  </div>

  <div id="screen-ready" class="screen">
    <h2 id="player-label"></h2>
    <button onclick="showWord()">ワード表示</button>
  </div>

  <div id="screen-word" class="screen">
    <div class="word-box" id="display-area"></div>
    <button onclick="nextStep()" id="next-btn"></button>
  </div>

  <div id="screen-timer" class="screen">
    <h2>話し合い</h2>
    <div id="timer-display"></div>
    <button onclick="forceStop()" class="btn-stop">終了</button>
  </div>

  <div id="screen-finish" class="screen">
    <h1 id="finish-title"></h1>
    <button onclick="location.reload()">リセット</button>
  </div>
</div>

<script>
const defaultPairs = [["りんご","なし"], ["うどん","そば"]];
let wordPairs = JSON.parse(localStorage.getItem('wordwolf_data')) || defaultPairs;
let deck = [], current = 0, timer;

// UI
function toggleSidebar(){ sidebar.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeAll(){ sidebar.classList.remove("open"); overlay.classList.remove("show"); }

// 単語追加
function isDuplicate(a,b){
  return wordPairs.some(p => (p[0]===a && p[1]===b)||(p[0]===b && p[1]===a));
}

function addNewPair(){
  const a=newWordA.value.trim();
  const b=newWordB.value.trim();
  if(!a||!b) return alert("入力してください");
  if(a===b) return alert("同じ単語NG");
  if(isDuplicate(a,b)) return alert("重複");
  wordPairs.push([a,b]);
  save();
  updateUI();
}

// 保存
function save(){ localStorage.setItem("wordwolf_data",JSON.stringify(wordPairs)); }

// UI更新
function updateUI(){
  wordCount.innerText = wordPairs.length;
  wordListArea.innerHTML = wordPairs.map((p,i)=>
    `<div>${p[0]} / ${p[1]} <button onclick="del(${i})">削除</button></div>`
  ).join("");
}

function del(i){ wordPairs.splice(i,1); save(); updateUI(); }

// ゲーム開始
function startGame(){
  const p=parseInt(playerCount.value);
  const w=parseInt(wolfCount.value);
  if(w>=p) return alert("人狼多すぎ");

  const pair = wordPairs[Math.floor(Math.random()*wordPairs.length)];
  const flip = Math.random()>0.5;

  const citizenWord = flip ? pair[0] : pair[1];
  const wolfWord    = flip ? pair[1] : pair[0];

  deck=[];
  for(let i=0;i<p-w;i++) deck.push(citizenWord);
  for(let i=0;i<w;i++) deck.push(wolfWord);

  deck.sort(()=>Math.random()-0.5);

  current=0;
  goReady();
}

// 進行
function goReady(){
  show("screen-ready");
  player-label.innerText = `${current+1}人目`;
}

function showWord(){
  show("screen-word");
  display-area.innerText = deck[current];
  next-btn.innerText = current===deck.length-1 ? "開始" : "次";
}

function nextStep(){
  if(current<deck.length-1){
    current++;
    goReady();
  }else{
    startTimer();
  }
}

// タイマー
function startTimer(){
  show("screen-timer");
  let sec = parseInt(limitTime.value)*60;
  timer=setInterval(()=>{
    sec--;
    timer-display.innerText = `${Math.floor(sec/60)}:${sec%60}`;
    if(sec<=0) finish("時間切れ");
  },1000);
}

function forceStop(){ finish("終了"); }

function finish(t){
  clearInterval(timer);
  finish-title.innerText=t;
  show("screen-finish");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

updateUI();
</script>

</body>
</html>
