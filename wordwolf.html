<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなで☆ワードウルフ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images.png">
  <style>
    :root {
      --primary: #111;
      --danger: #444;
      --bg: #0a0a0a;
    }

    body {
      font-family: sans-serif;
      text-align: center;
      padding: 24px;
      background-color: var(--bg);
      color: #e0e0e0;
      margin: 0;
    }

    .menu-btn {
      position: fixed;
      top: 0px;
      right: 0px;
      width:40px;
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 9999;
      color: #aaa;
      padding: 0px;
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: -300px;
      width: 280px;
      height: 100%;
      background: #111;
      box-shadow: -2px 0 15px rgba(255,255,255,0.05);
      transition: 0.3s;
      z-index: 1000;
      text-align: left;
      padding: 18px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar.open {
      right: 0;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .card {
      background: #111;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(255,255,255,0.05);
      max-width: 400px;
      margin: 60px auto auto;
    }

    .screen {
      display: none;
    }

    .active {
      display: block;
    }

    button {
      background: var(--primary);
      color: #eee;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 12px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #fff;
      color: #000;
      box-shadow: 0 0 10px rgba(255,255,255,0.6),
                  0 0 20px rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 0 5px rgba(255,255,255,0.4);
    }

    .btn-stop {
      background: #222;
    }

    .btn-outline {
      background: #111;
      color: #ccc;
      margin-top: 4px;
    }

    .btn-info {
      background: #222;
      margin-top: 18px;
    }

    input {
      padding: 8px;
      font-size: 15px;
      width: 88%;
      margin: 4px 0;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0a0a0a;
      color: #eee;
    }

    .word-box {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      margin: 28px 0;
      padding: 18px;
      border: 2px solid #555;
    }

    #timer-display {
      font-size: 56px;
      font-weight: bold;
      margin: 8px 0;
      color: #fff;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 8px 0;
      user-select: none;
    }

    .list-header.open span.arrow {
      transform: rotate(90deg);
    }

    #wordListArea {
      display: none;
      margin-top: 8px;
      border-top: 1px solid #333;
    }

    #wordListArea.show {
      display: block;
    }

    .word-item {
      font-size: 12px;
      border-bottom: 1px solid #222;
      padding: 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background: #111;
      color: #888;
      width: auto;
      padding: 3px 6px;
      margin: 0;
      font-size: 10px;
    }

    hr {
      border: 0;
      border-top: 1px solid #222;
      margin: 18px 0;
    }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(255,255,255,0.08);
      z-index: 2000;
      width: 80%;
      max-width: 300px;
      display: none;
    }

    .modal.show {
      display: block;
    }
  </style>
</head>
<body>

  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="overlay" id="overlay" onclick="closeAll()"></div>

  <div class="sidebar" id="sidebar">
    <h3>設定メニュー</h3>
    <hr>
    <h4>単語ペアの追加</h4>
    <input type="text" id="newWordA" placeholder="ワードA (市民)">
    <input type="text" id="newWordB" placeholder="ワードB (人狼)">
    <button onclick="addNewPair()">追加する</button>
    <hr>
    <h4>バックアップ・共有</h4>
    <button class="btn-outline" onclick="exportData()">データを書き出す</button>
    <button class="btn-outline" onclick="document.getElementById('importFile').click()">データを読み込む</button>
    <input type="file" id="importFile" style="display:none;" onchange="importData(this)">
    <hr>
    <div class="list-header" id="listHeader" onclick="toggleWordList()">
      <h4 style="margin:0;">登録済み単語 (<span id="wordCount">0</span>)</h4>
      <span class="arrow">▶</span>
    </div>
    <div id="wordListArea"></div>
    <hr>
    <button class="btn-info" onclick="toggleAbout()">制作者情報</button>
  </div>

  <div id="aboutModal" class="modal">
    <h3>制作者について</h3>
    <p style="text-align:left; font-size:13px; line-height:1.6;">
      <strong>制作者：</strong> ニワトリ<br>
      <strong>メッセージ：</strong><br>
      不具合はないと思いたいのですが、あった場合は諦めてください。
    </p>
    <button onclick="toggleAbout()">閉じる</button>
  </div>

  <div class="card">
    <div id="screen-start" class="screen active">
      <h2>ゲーム設定</h2>
      <p>人数：<input type="number" id="playerCount" value="3" min="3" style="width:55px;"> 人</p>
      <p>時間：<input type="number" id="limitTime" value="3" min="1" style="width:55px;"> 分</p>
      <button onclick="startGame()">ゲーム開始</button>
    </div>

    <div id="screen-ready" class="screen">
      <h2 id="player-label"></h2>
      <p>他の方に見られないよう確認してください</p>
      <button onclick="showWord()">ワードを表示する</button>
    </div>

    <div id="screen-word" class="screen">
      <p>あなたのワードは</p>
      <div class="word-box" id="display-area"></div>
      <button id="next-btn" onclick="nextStep()"></button>
    </div>

    <div id="screen-timer" class="screen">
      <h2>話し合いタイム</h2>
      <div id="timer-display">00:00</div>
      <button class="btn-stop" onclick="forceStop()">強制終了</button>
    </div>

    <div id="screen-finish" class="screen">
      <h1 id="finish-title">終了！</h1>
      <button onclick="location.reload()" style="background:#222;">最初に戻る</button>
    </div>
  </div>

  <script>
    const defaultPairs = [["りんご","なし"], ["うどん","そば"], ["ダイヤモンド","グラファイト"], ["泥棒","サンタ"]];
    let wordPairs = [], deck = [], current = 0, timer;

    window.onload = () => {
      wordPairs = JSON.parse(localStorage.getItem('wordwolf_data')) || defaultPairs;
      updateWordListUI();
    };

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function toggleWordList() {
      document.getElementById('listHeader').classList.toggle('open');
      document.getElementById('wordListArea').classList.toggle('show');
    }

    function toggleAbout() {
      document.getElementById('aboutModal').classList.toggle('show');
      document.getElementById('overlay').classList.toggle('show');
    }

    function closeAll() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('aboutModal').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
    }

    function isDuplicate(a, b) {
      return wordPairs.some(pair =>
        (pair[0] === a && pair[1] === b) ||
        (pair[0] === b && pair[1] === a)
      );
    }

    function addNewPair() {
      const a = document.getElementById('newWordA').value.trim();
      const b = document.getElementById('newWordB').value.trim();

      if (!a || !b) return alert("両方の単語を入力してください");
      if (a === b) return alert("同じ単語は登録できません");

      if (isDuplicate(a, b)) {
        alert("そのペアは既に登録されています！");
        return;
      }

      wordPairs.push([a, b]);
      saveData();
      updateWordListUI();

      document.getElementById('newWordA').value = "";
      document.getElementById('newWordB').value = "";
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(wordPairs, null, 2)], { type: "application/json" });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "wordwolf_backup.json";
      a.click();
    }

    function importData(input) {
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            let addedCount = 0;

            imported.forEach(pair => {
              if (Array.isArray(pair) && pair.length === 2) {
                const a = pair[0].trim();
                const b = pair[1].trim();

                if (!isDuplicate(a, b) && a !== b) {
                  wordPairs.push([a, b]);
                  addedCount++;
                }
              }
            });

            saveData();
            updateWordListUI();
            alert(`${addedCount}件の新しいペアを追加しました！(重複は無視されました)`);
          }
        } catch {
          alert("正しいファイル形式ではありません。");
        }
      };

      reader.readAsText(input.files[0]);
    }

    function deletePair(index) {
      if (confirm("このペアを削除しますか？")) {
        wordPairs.splice(index, 1);
        saveData();
        updateWordListUI();
      }
    }

    function saveData() {
      localStorage.setItem('wordwolf_data', JSON.stringify(wordPairs));
    }

    function updateWordListUI() {
      document.getElementById('wordCount').innerText = wordPairs.length;

      document.getElementById('wordListArea').innerHTML =
        wordPairs.map((p, i) => `
          <div class="word-item">
            <span>${p[0]} / ${p[1]}</span>
            <button class="delete-btn" onclick="deletePair(${i})">削除</button>
          </div>
        `).join('');
    }

    function startGame() {
      const pCount = parseInt(document.getElementById('playerCount').value);

      if (wordPairs.length === 0) {
        alert("単語を登録してください");
        return;
      }

      const pair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
      const isBWolf = Math.random() > 0.5;

      const cW = isBWolf ? pair[0] : pair[1];
      const wW = isBWolf ? pair[1] : pair[0];

      deck = Array(pCount - 1)
        .fill(cW)
        .concat([wW])
        .sort(() => Math.random() - 0.5);

      current = 0;
      goReady();
    }

    function goReady() {
      showScreen('screen-ready');
      document.getElementById('player-label').innerText = `${current + 1}人目の抽選`;
    }

    function showWord() {
      showScreen('screen-word');
      document.getElementById('display-area').innerText = deck[current];

      document.getElementById('next-btn').innerText =
        (current === deck.length - 1) ? "全員完了" : "確認しました";
    }

    function nextStep() {
      if (current < deck.length - 1) {
        current++;
        goReady();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      showScreen('screen-timer');

      let sec = parseInt(document.getElementById('limitTime').value) * 60;
      updateDisplay(sec);

      timer = setInterval(() => {
        sec--;
        updateDisplay(sec);

        if (sec <= 0) {
          timeUp("時間切れ！");
        }
      }, 1000);
    }

    function updateDisplay(sec) {
      document.getElementById('timer-display').innerText =
        `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
    }

    function forceStop() {
      timeUp("強制終了！");
    }

    function timeUp(txt) {
      clearInterval(timer);
      document.getElementById('finish-title').innerText = txt;
      showScreen('screen-finish');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>

</body>
</html>
